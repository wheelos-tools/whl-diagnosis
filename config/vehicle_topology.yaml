aliases:
  front_main_cam:
    match_by: usb_serial
    value: CAM-SN-123
  sys_eth:
    match_by: mac_address
    value: 3c:6d:66:18:33:0b
description: L4 Robotaxi generation-2 sensor suite
diagnosis_mode: default
infrastructure:
  expected_cpu_cores: 16
  expected_gpu_count: 2
  storage:
    data_path: /data
    min_free_gb: 50
network:
  interfaces:
  - expected_mtu: 9000
    expected_speed: 1000
    name: ${sys_eth}
    role: ptp_sync
  - expected_mtu: 9000
    expected_speed: 10000
    name: eth1
    role: lidar_data
sensors:
  cameras:
  - device: ${front_main_cam}
    expected_fps: 30
    name: front_main
    resolution: 1920x1080
    serial_number: CAM-SN-001
  - device: /dev/video2
    expected_fps: 30
    name: front_left
    resolution: 1920x1080
    serial_number: CAM-SN-002
  can:
    interfaces:
    - bitrate: 500000
      expected_messages:
      - expected_hz: 100
        id: '0x123'
        name: VehicleSpeed
      - expected_hz: 50
        id: '0x456'
        name: SteeringAngle
      name: can0
  lidars:
  - expected_packets_per_second: 754
    name: top_lidar
    port: 2368
    sample_duration_s: 2.0
    type: velodyne_vlp16
  - expected_packets_per_second: 600
    name: front_lidar
    port: 2369
    type: hesai_xt32
thresholds:
  cpu_temp_c: 90
  gpu_temp_c: 85
  min_disk_free_gb: 50
  ptp_offset_ns: 500
time_sync:
  gnss:
    nmea_baud: 115200
    nmea_device: /dev/ttyUSB0
    pps_device: /dev/pps0
  ptp:
    domain: 0
    expected_gm_identity: 00:11:22:ff:fe:33:44:55
    interface: eth0
    master_ip: 192.168.1.10
vehicle_type: L4_Robotaxi_v2
